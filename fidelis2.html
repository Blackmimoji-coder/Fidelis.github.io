    function navigateTo(page) {

    function toggleView(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
      if (currentView === 'public') {
        currentView = 'admin';
        isAdminLoggedIn = false;
        loginError = '';
      } else {
        currentView = 'public';
      }
      render();
      window.scrollTo(0, 0);
    }

    function toggleAdminView() {
      currentView = 'admin';
      isAdminLoggedIn = false;
      loginError = '';
      render();
      window.scrollTo(0, 0);
    }

      currentView = 'public';

    function handleAdminLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('login-btn');
      
      // Disable button and show loading state
      loginBtn.disabled = true;
      const originalText = loginBtn.textContent;
      loginBtn.textContent = 'Signing in...';
      
      supabase.auth.signInWithPassword({
        email,
        password
      }).then(({ data, error }) => {
        if (error) {
          loginError = error.message || 'Invalid email or password';
          render();
        } else if (data.user) {
          supabaseUser = data.user;
          isAdminLoggedIn = true;
          loginError = '';
          currentAdminName = data.user.email?.split('@')[0] || 'Admin';
          currentAdminRole = 'Manager';
          render();
          // Load data from Supabase after login
          loadDataFromSupabase();
        }
      }).catch(err => {
        loginError = 'Login failed. Please try again.';
        console.error('Login error:', err);
        render();
      }).finally(() => {
        loginBtn.disabled = false;
        loginBtn.textContent = originalText;
      });
    }

    function handleAdminLogout() {
      supabase.auth.signOut().then(() => {
        isAdminLoggedIn = false;
        supabaseUser = null;
        currentView = 'public';
        services = [];
        bookings = [];
        staff = [];
        inventory = [];
        galleryItems = [];
        render();
      });
    }

    function updateBookingForm(field, value) {
      bookingFormData[field] = value;

      }

    function bookService(serviceId) {
      bookingFormData.service = serviceId.toString();
      navigateTo('booking');
    }

    function handleBookingSubmit(e) {
      e.preventDefault();
      const clientPhone = bookingFormData.phone;
      const clientName = bookingFormData.name;
      const selectedService = services.find(s => s.id === parseInt(bookingFormData.service));
      
      if (!selectedService) {
        loginError = 'Please select a valid service';
        return;
      }
      
      const booking = {
        client_name: clientName,
        client_phone: clientPhone,
        service_id: selectedService.id,
        service_name: selectedService.name,
        full_price: selectedService.price,
        deposit_paid: 0,
        balance: selectedService.price,
        date: bookingFormData.date,
        time: bookingFormData.time,
        status: 'pending',
        created_at: new Date().toISOString()
      };
      
      // Send to Supabase
      supabase
        .from('bookings')
        .insert([booking])
        .then(({ data, error }) => {
          if (error) {
            loginError = 'Failed to save booking: ' + error.message;
            console.error('Booking error:', error);
          } else {
            // Add to local state
            bookings.push({
              id: data?.[0]?.id || Math.random(),
              ...booking
            });
            
            // Send WhatsApp message
            sendWhatsAppMessage(clientPhone, clientName);
            
            showModal = true;
            modalType = 'bookingConfirmation';
            render();
            
            // Reset form
            bookingFormData = { name: '', phone: '', service: '', date: '', time: '' };
          }
        });
    }
    
    function sendWhatsAppMessage(phone, name) {
      // Format phone number for WhatsApp (remove special chars, ensure country code)
      let formattedPhone = phone.replace(/\D/g, '');
      if (!formattedPhone.startsWith('254')) {
        formattedPhone = '254' + formattedPhone.slice(-9);
      }
      
      const message = `Hello ${name}, thank you for booking with Fidelis Nail Parlour! We've received your booking request. Our team will contact you shortly to confirm your appointment and provide payment details.`;
      const encodedMessage = encodeURIComponent(message);
      const whatsappUrl = `https://wa.me/${formattedPhone}?text=${encodedMessage}`;
      window.open(whatsappUrl, '_blank');
    }

      const role = document.getElementById('staffRole').value;

                ...staffData
              });

            }
          });
      } else {
        supabase
          .from('staff')
          .update(staffData)
          .eq('id', modalData.id)
          .then(({ error }) => {

            } else {
              const existingStaff = staff.find(s => s.id === modalData.id);
              if (existingStaff) {
                Object.assign(existingStaff, staffData);

    function handleMediaUpload(e) {
      e.preventDefault();
      const fileInput = document.getElementById('mediaFile');
      const file = fileInput.files[0];
      const service = document.getElementById('mediaService').value;
      
      if (!file) {
        alert('Please select a file to upload');
        return;
      }
      
      if (!service) {
        alert('Please select a service category');
        return;
      }
      
      // Validate file size
      const maxSize = modalType === 'uploadImage' ? 10 * 1024 * 1024 : 50 * 1024 * 1024;
      if (file.size > maxSize) {
        alert(`File size exceeds ${modalType === 'uploadImage' ? '10MB' : '50MB'} limit`);
        return;
      }
      
      // Read file and create data URL
      const reader = new FileReader();
      reader.onload = function(event) {
        const fileData = event.target.result;
        
        const colors = ['from-pink-300 to-rose-400', 'from-purple-300 to-indigo-400', 'from-amber-300 to-orange-400', 'from-teal-300 to-cyan-400', 'from-red-300 to-pink-400', 'from-blue-300 to-cyan-400'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        const heights = ['h-48', 'h-52', 'h-56', 'h-60', 'h-64'];
        const randomHeight = heights[Math.floor(Math.random() * heights.length)];
        
        const galleryItem = {
          type: modalType === 'uploadImage' ? 'image' : 'video',
          service,
          file_name: file.name,
          file_data: fileData,
          color: randomColor,
          height: randomHeight,
          uploaded_at: new Date().toISOString()
        };
        
        // Save to Supabase gallery
        supabase
          .from('gallery')
          .insert([galleryItem])
          .then(({ data, error }) => {
            if (error) {
              console.error('Error uploading media:', error);
            } else {
              galleryItems.push({
                id: data?.[0]?.id || nextGalleryId++,
                ...galleryItem
              });
              closeModal();
            }
          });
      };
      reader.readAsDataURL(file);
    }
    
    function updateFileName(input) {
      if (input.files && input.files[0]) {
        const fileName = document.getElementById('fileName');
        fileName.textContent = input.files[0].name;

    function sendSTKPush(bookingId, phoneNumber) {
      // Format phone for M-Pesa STK (ensure proper Kenyan format)
      let formattedPhone = phoneNumber.replace(/\D/g, '');
      if (formattedPhone.startsWith('0')) {

        formattedPhone = '254' + formattedPhone.slice(-9);
      }

      const booking = bookings.find(b => b.id === bookingId);

    // Load all data from Supabase
    async function loadDataFromSupabase() {
      try {
        // First initialize with sample data
        initializeSampleData();
        
        // Try to load services
        const { data: servicesData, error: servicesError } = await supabase.from('services').select('*');
        if (!servicesError && servicesData && servicesData.length > 0) {
          services = servicesData;
        }
        
        // Try to load bookings
        const { data: bookingsData, error: bookingsError } = await supabase.from('bookings').select('*');
        if (!bookingsError && bookingsData) {
          bookings = bookingsData;
        }
        
        // Try to load staff
        const { data: staffData, error: staffError } = await supabase.from('staff').select('*');
        if (!staffError && staffData && staffData.length > 0) {
          staff = staffData;
        }
        
        // Try to load inventory
        const { data: inventoryData, error: inventoryError } = await supabase.from('inventory').select('*');
        if (!inventoryError && inventoryData && inventoryData.length > 0) {
          inventory = inventoryData;
        }
        
        // Try to load gallery
        const { data: galleryData, error: galleryError } = await supabase.from('gallery').select('*');
        if (!galleryError && galleryData) {
          galleryItems = galleryData;
        }
        
        render();
      } catch (error) {
        console.error('Error loading data from Supabase:', error);
        // Data is already initialized with samples, just render
        render();
      }
    }
